<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item - WAR: Return of Reckoning Database</title>
<link rel="stylesheet" href="style.css">
<style>
  .item-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    align-items: start;
  }
  .item-render-panel {
    background: linear-gradient(180deg, #0a0800 0%, #120f04 100%);
    border-right: 1px solid var(--border-red);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    gap: 12px;
    min-height: 260px;
    justify-content: center;
    position: relative;
  }
  .item-render-panel::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--red-dim), transparent);
  }
  .screenshot-area {
    width: 180px;
    height: 180px;
    position: relative;
  }
  .screenshot-area img.screenshot-img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border: 1px solid var(--border-red);
    display: block;
  }
  .screenshot-upload-label {
    width: 180px;
    height: 180px;
    border: 1px dashed var(--border-red);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(0,0,0,0.2);
    gap: 8px;
  }
  .screenshot-upload-label:hover {
    border-color: var(--red);
    background: rgba(191,74,6,0.08);
  }
  .screenshot-upload-icon { font-size: 28px; opacity: 0.5; }
  .screenshot-upload-text {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    line-height: 1.4;
    padding: 0 8px;
  }
  .ss-pending-badge {
    font-size: 10px;
    color: var(--yellow);
    font-style: italic;
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }
  #screenshot-file-input { display: none; }
  #ss-status {
    font-size: 11px;
    font-style: italic;
    text-align: center;
    color: var(--text-muted);
    min-height: 16px;
  }
  .item-icon-row { display: flex; align-items: center; gap: 8px; }
  .item-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--border-red);
    background: var(--bg4);
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .item-icon-label {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Crimson Text', serif;
  }
  .item-info-panel { padding: 24px; }
  .item-details { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
  .item-detail-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .detail-label { color: var(--text-muted); font-style: italic; min-width: 80px; font-size: 13px; }
  .detail-value { color: var(--text-bright); }
  .stats-section { margin-top: 14px; border-top: 1px solid var(--border-red); padding-top: 12px; }
  .stats-section-title {
    font-family: 'MedievalSharp', cursive;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--yellow); text-transform: uppercase; margin-bottom: 8px;
  }
  /* Pending overlay */
  .ss-pending-overlay {
    width: 180px;
    height: 180px;
    border: 1px solid var(--yellow-dark);
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .ss-pending-overlay .ss-pending-icon { font-size: 32px; }
  .ss-pending-overlay .ss-pending-text {
    font-size: 12px;
    color: var(--yellow-dim);
    font-style: italic;
    font-family: 'Crimson Text', serif;
    text-align: center;
    line-height: 1.5;
    padding: 0 12px;
  }
  .ss-pending-overlay .ss-replace-hint {
    font-size: 10px;
    color: var(--text-muted);
    font-style: italic;
    cursor: pointer;
  }
  .ss-pending-overlay .ss-replace-hint:hover { color: var(--yellow); text-decoration: underline; }

  /* Lightbox */
  .ss-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .ss-lightbox.active { display: flex; }
  .ss-lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border: 1px solid var(--border-red);
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    cursor: default;
  }
  .ss-lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    font-size: 28px;
    color: var(--text-dim);
    cursor: pointer;
    line-height: 1;
    z-index: 10000;
  }
  .ss-lightbox-close:hover { color: var(--yellow); }

  @media (max-width: 640px) {
    .item-layout { grid-template-columns: 1fr; }
    .item-render-panel {
      border-right: none; border-bottom: 1px solid var(--border-red);
      min-height: auto; padding: 16px; flex-direction: row; justify-content: flex-start;
    }
    .screenshot-area, .screenshot-upload-label, .screenshot-area img.screenshot-img {
      width: 120px; height: 120px;
    }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">☠ WAR: RoR Database</a>
  <div class="nav-links">
    <a href="items.html" class="active">Items</a>
    <a href="npcs.html">NPCs</a>
    <a href="quests.html">Quests</a>
    <a href="zones.html">Zones</a>
    <a href="pqs.html">Public Quests</a>
  </div>
</nav>
<div class="breadcrumb">
  <a href="index.html">Home</a><span>›</span>
  <a href="items.html">Items</a><span>›</span>
  <span id="breadcrumb-name">Loading...</span>
</div>
<div class="container">
  <div id="content"><div class="loading-inline"><span class="spinner"></span>Loading item...</div></div>
</div>
<input type="file" id="screenshot-file-input" accept="image/*">

<!-- Lightbox -->
<div class="ss-lightbox" id="ss-lightbox">
  <span class="ss-lightbox-close" id="ss-lightbox-close">✕</span>
  <img id="ss-lightbox-img" src="" alt="screenshot fullsize">
</div>

<script>
const API          = 'https://ror-api-production-acc5.up.railway.app';
const SUPABASE_URL = 'https://rmihmhpoistwtnbcecli.supabase.co';
const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtaWhtaHBvaXN0d3RuYmNlY2xpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTAwOTMsImV4cCI6MjA4OTAyNjA5M30.7yC3eANrpqoRbGLm6LIJk6w5raw-ny3DYhiAQe42XY8';
const STORAGE_PUB  = `${SUPABASE_URL}/storage/v1/object/public/screenshots`;
const ICONS_URL    = `${SUPABASE_URL}/storage/v1/object/public/icons`;

const RARITY_CLASS = {
  'Common':'rarity-Common','Uncommon':'rarity-Uncommon','Rare':'rarity-Rare',
  'Very Rare':'rarity-Very Rare','Artifact':'rarity-Artifact','Sovereign':'rarity-Sovereign'
};

function getEntry() { return new URLSearchParams(window.location.search).get('entry'); }

function formatStats(obj) {
  if (!obj || !Object.keys(obj).length) return '';
  return Object.entries(obj).filter(([k,v])=>v&&v!==0)
    .map(([k,v])=>`<div class="stat-row">${v} ${k}</div>`).join('');
}

function formatDropChance(pct) {
  if (!pct) return '';
  const p = parseFloat(pct);
  return p < 0.01 ? '< 0.01%' : p.toFixed(2) + '%';
}

async function urlExists(url) {
  try {
    const r = await fetch(url, { method: 'HEAD' });
    return r.ok;
  } catch(e) { return false; }
}

async function uploadToStorage(path, file) {
  const url = `${SUPABASE_URL}/storage/v1/object/screenshots/${path}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey':        ANON_KEY,
      'Authorization': `Bearer ${ANON_KEY}`,
      'Content-Type':  file.type,
      'x-upsert':      'true',
    },
    body: file,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`${res.status}: ${err}`);
  }
}

async function initScreenshot(entry) {
  const area     = document.getElementById('ss-area');
  const label    = document.getElementById('ss-label');
  const img      = document.getElementById('ss-img');
  const badge    = document.getElementById('ss-badge');
  const status   = document.getElementById('ss-status');
  const fileInput= document.getElementById('screenshot-file-input');

  const approvedUrl = `${STORAGE_PUB}/approved/${entry}.png`;
  const pendingUrl  = `${STORAGE_PUB}/pending/${entry}.png`;

  // Lightbox setup
  const lightbox     = document.getElementById('ss-lightbox');
  const lightboxImg  = document.getElementById('ss-lightbox-img');
  const lightboxClose= document.getElementById('ss-lightbox-close');

  function openLightbox(url) {
    lightboxImg.src = url;
    lightbox.classList.add('active');
  }
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) lightbox.classList.remove('active'); });
  lightboxClose.addEventListener('click', () => lightbox.classList.remove('active'));
  document.addEventListener('keydown', (e) => { if(e.key==='Escape') lightbox.classList.remove('active'); });

  function showApproved(url) {
    area.innerHTML = `<img class="screenshot-img" src="${url}" alt="screenshot" style="cursor:zoom-in" title="Click to view full size">`;
    area.querySelector('img').addEventListener('click', () => openLightbox(url));
    label.style.display = 'none';
    if (badge) badge.style.display = 'none';
    if (status) status.textContent = '';
  }

  function showPending() {
    area.innerHTML = `
      <div class="ss-pending-overlay">
        <span class="ss-pending-icon">⏳</span>
        <span class="ss-pending-text">Screenshot Pending Review</span>
        <span class="ss-replace-hint" id="ss-replace-link">Submit a different one?</span>
      </div>`;
    document.getElementById('ss-replace-link').addEventListener('click', () => fileInput.click());
    label.style.display = 'none';
    if (badge) badge.style.display = 'none';
    if (status) { status.textContent = 'Awaiting moderator approval'; status.style.color = 'var(--yellow-dim)'; }
  }

  function showUpload() {
    area.innerHTML = `
      <label class="screenshot-upload-label" id="ss-label">
        <span class="screenshot-upload-icon">📷</span>
        <span class="screenshot-upload-text">Click or drag to upload<br>a screenshot</span>
      </label>`;
    document.getElementById('ss-label').addEventListener('click', () => fileInput.click());
    if (badge) badge.style.display = 'none';
    if (status) status.textContent = '';
  }

  function setStatus(msg, color='var(--text-muted)') {
    if (status) { status.textContent = msg; status.style.color = color; }
  }

  // Check approved first, then pending
  if (await urlExists(approvedUrl)) {
    showApproved(approvedUrl);
  } else if (await urlExists(pendingUrl)) {
    showPending();
  } else {
    showUpload();
  }

  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    setStatus('Uploading...', 'var(--yellow)');
    try {
      await uploadToStorage(`pending/${entry}.png`, file);
      showPending();
      setStatus('Submitted! Awaiting moderator approval.', '#4fc34f');
      setTimeout(() => setStatus('Awaiting moderator approval', 'var(--yellow-dim)'), 3000);
    } catch(e) {
      setStatus('Upload failed. Try again.', '#e88');
      console.error(e);
    }
    fileInput.value = '';
  }

  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  // Drag and drop on the whole panel
  area.addEventListener('dragover', (e) => { e.preventDefault(); });
  area.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
}

function renderItem(data) {
  const entry       = data.entry;
  const rarityClass = RARITY_CLASS[data.rarity_name] || '';
  const statsHtml   = data.stats_parsed && Object.keys(data.stats_parsed).length
    ? `<div class="stats-section"><div class="stats-section-title">Stats</div>
       <div class="stats-grid">${formatStats(data.stats_parsed)}</div></div>` : '';

  const droppedBy = data.dropped_by || [];
  const soldBy    = data.sold_by    || [];
  const droppedRows = droppedBy.length
    ? droppedBy.map(n=>`<tr>
        <td><a class="link" href="npc.html?entry=${n.entry}">${n.display_name||'Unknown'}</a></td>
        <td>${formatDropChance(n.drop_chance)||'—'}</td>
        <td>${n.minlevel||''}${n.maxlevel&&n.maxlevel!==n.minlevel?'–'+n.maxlevel:''}</td>
      </tr>`).join('')
    : `<tr><td colspan="3"><div class="empty-state">No drop sources found</div></td></tr>`;
  const soldRows = soldBy.length
    ? soldBy.map(n=>`<tr>
        <td><a class="link" href="npc.html?entry=${n.entry}">${n.display_name||'Unknown'}</a></td>
        <td>${n.price?n.price.toLocaleString():'—'}</td>
        <td>${n.zone||'—'}</td>
      </tr>`).join('')
    : `<tr><td colspan="3"><div class="empty-state">Not sold by any vendor</div></td></tr>`;

  document.getElementById('breadcrumb-name').textContent = data.display_name || `Item #${entry}`;
  document.title = `${data.display_name} - WAR Database`;

  const icon = data.iconid ? `${ICONS_URL}/icon_${data.iconid}.png` : null;
  const iconHtml = icon ? `<img class="item-icon" src="${icon}" alt="icon" onerror="this.style.display='none'">` : '';
  const iconRowHtml = iconHtml
    ? `<div class="item-icon-row">${iconHtml}<span class="item-icon-label">${data.slot_name||data.type_name||''}</span></div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="entity-header" style="padding:0;overflow:hidden;">
      <div class="item-layout">
        <div class="item-render-panel">
          <div class="screenshot-area" id="ss-area">
            <img class="screenshot-img" id="ss-img" style="display:none" alt="screenshot">
            <label class="screenshot-upload-label" id="ss-label">
              <span class="screenshot-upload-icon">📷</span>
              <span class="screenshot-upload-text">Click or drag to upload<br>a screenshot</span>
            </label>
          </div>
          <div class="ss-pending-badge" id="ss-badge" style="display:none">⏳ Pending approval</div>
          <div id="ss-status"></div>
          ${iconRowHtml}
        </div>
        <div class="item-info-panel">
          <div class="entity-name ${rarityClass}">${data.display_name||'Unknown Item'}</div>
          <div class="item-details">
            ${data.rarity_name?`<div class="item-detail-row"><span class="detail-label">Rarity</span><span class="detail-value ${rarityClass}">${data.rarity_name}</span></div>`:''}
            ${data.type_name?`<div class="item-detail-row"><span class="detail-label">Type</span><span class="detail-value">${data.type_name}</span></div>`:''}
            ${data.slot_name&&data.slot_name!=='None'?`<div class="item-detail-row"><span class="detail-label">Slot</span><span class="detail-value">${data.slot_name}</span></div>`:''}
            ${data.minrank?`<div class="item-detail-row"><span class="detail-label">Min Rank</span><span class="detail-value">${data.minrank}</span></div>`:''}
            ${data.armor?`<div class="item-detail-row"><span class="detail-label">Armor</span><span class="detail-value">${data.armor}</span></div>`:''}
            ${data.dps?`<div class="item-detail-row"><span class="detail-label">DPS</span><span class="detail-value">${(data.dps/1000).toFixed(1)}</span></div>`:''}
            <div class="item-detail-row"><span class="detail-label">Entry</span><span class="detail-value" style="color:var(--text-muted);font-size:12px">#${entry}</span></div>
          </div>
          ${statsHtml}
          ${data.description?`<div class="entity-desc">${data.description}</div>`:''}
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Dropped By</span><span class="panel-count">${droppedBy.length}</span></div>
      <table><thead><tr><th>NPC</th><th>Drop Chance</th><th>Level</th></tr></thead><tbody>${droppedRows}</tbody></table>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Sold By</span><span class="panel-count">${soldBy.length}</span></div>
      <table><thead><tr><th>Vendor</th><th>Price</th><th>Zone</th></tr></thead><tbody>${soldRows}</tbody></table>
    </div>`;

  initScreenshot(entry);
}

async function load() {
  const entry = getEntry();
  if (!entry) { document.getElementById('content').innerHTML=`<div class="error-box">No item entry specified.</div>`; return; }
  try {
    const res = await fetch(`${API}/item_detail?entry=${entry}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    renderItem(await res.json());
  } catch(e) {
    document.getElementById('content').innerHTML=`<div class="error-box">Failed to load item: ${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
