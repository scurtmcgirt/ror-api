<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Item Viewer - WAR: Return of Reckoning</title>
<link rel="stylesheet" href="style.css">
<style>
  body { overflow: hidden; }
  .viewer-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 93px);
  }
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border-red);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-red);
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-title {
    font-family: 'MedievalSharp', cursive;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .sidebar-select {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border-red);
    color: var(--text-bright);
    padding: 5px 8px;
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .sidebar-select:focus { border-color: var(--red); }
  option { background: var(--bg3); }
  .item-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--border-red); }
  .item-entry {
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background 0.1s;
  }
  .item-entry:hover { background: var(--bg3); color: var(--text-bright); }
  .item-entry.active { background: rgba(191,74,6,0.15); color: var(--yellow); border-left: 2px solid var(--red); padding-left: 12px; }
  .item-icon-small { width: 22px; height: 22px; image-rendering: pixelated; flex-shrink: 0; opacity: 0.8; }
  .item-entry-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-entry-rank { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .item-count { font-size: 11px; color: var(--text-muted); padding: 4px 14px; font-style: italic; }
  .viewer-main {
    display: flex;
    flex-direction: column;
    background: #080600;
    position: relative;
  }
  #three-canvas { flex: 1; width: 100%; display: block; }
  .viewer-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    pointer-events: none;
  }
  .viewer-hint .hint-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.25; }
  .viewer-info {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--border-red);
    padding: 10px 14px;
    max-width: 220px;
    display: none;
  }
  .viewer-item-name { font-family: 'MedievalSharp', cursive; font-size: 13px; color: var(--yellow); margin-bottom: 3px; }
  .viewer-item-meta { font-size: 11px; color: var(--text-dim); font-style: italic; }
  .viewer-controls {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 8px;
  }
  .ctrl-btn {
    background: rgba(0,0,0,0.65);
    border: 1px solid var(--border-red);
    color: var(--text-dim);
    padding: 5px 12px;
    font-family: 'Crimson Text', serif;
    font-size: 12px;
    cursor: pointer;
  }
  .ctrl-btn:hover { border-color: var(--red); color: var(--text-bright); }
  .drag-hint {
    position: absolute;
    bottom: 46px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    font-style: italic;
    pointer-events: none;
    display: none;
    white-space: nowrap;
  }
  .loading-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: var(--text-muted);
    font-style: italic;
    font-size: 13px;
    display: none;
  }
  .msg { padding: 24px; text-align: center; color: var(--text-muted); font-style: italic; font-size: 13px; }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">☠ WAR: RoR Database</a>
  <div class="nav-links">
    <a href="items.html">Items</a>
    <a href="viewer3d.html" class="active">3D Viewer</a>
    <a href="npcs.html">NPCs</a>
    <a href="quests.html">Quests</a>
    <a href="zones.html">Zones</a>
  </div>
</nav>
<div class="breadcrumb">
  <a href="index.html">Home</a><span>›</span>
  <span>3D Item Viewer</span>
</div>

<div class="viewer-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Browse Items</div>
      <select class="sidebar-select" id="sel-career">
        <option value="">— Select Career —</option>
        <optgroup label="Order">
          <option value="32">Rune Priest</option>
          <option value="64">Engineer</option>
          <option value="1024">Ironbreaker</option>
          <option value="2048">Slayer</option>
          <option value="1">Warrior Priest</option>
          <option value="2">Bright Wizard</option>
          <option value="262144">Witch Hunter</option>
          <option value="8">White Lion</option>
          <option value="4">Shadow Warrior</option>
          <option value="16">Archmage</option>
        </optgroup>
        <optgroup label="Destruction">
          <option value="512">Black Orc</option>
          <option value="128">Squig Herder</option>
          <option value="256">Shaman</option>
          <option value="4096">Chosen</option>
          <option value="8192">Marauder</option>
          <option value="16384">Zealot</option>
          <option value="32768">Witch Elf</option>
          <option value="65536">Disciple</option>
          <option value="131072">Sorceress</option>
        </optgroup>
      </select>
      <select class="sidebar-select" id="sel-slot">
        <option value="">— All Slots —</option>
        <option value="BODY">Body / Chest</option>
        <option value="HELM">Helm</option>
        <option value="SHOU">Shoulder</option>
        <option value="GLOV">Gloves</option>
        <option value="BOOT">Boots</option>
        <option value="BELT">Belt</option>
        <option value="BACK">Back / Cloak</option>
        <option value="RGHT">Main Hand</option>
        <option value="LEFT">Off Hand</option>
        <option value="EITHER">Either Hand</option>
        <option value="NECK">Neck</option>
        <option value="FINGER">Ring / Jewelry</option>
      </select>
      <select class="sidebar-select" id="sel-rarity">
        <option value="">— All Rarities —</option>
        <option value="0">Common</option>
        <option value="1">Uncommon</option>
        <option value="2">Rare</option>
        <option value="3">Very Rare</option>
        <option value="4">Artifact</option>
        <option value="5">Sovereign</option>
      </select>
    </div>
    <div class="item-count" id="item-count"></div>
    <div class="item-list" id="item-list">
      <div class="msg">Select a career to browse items</div>
    </div>
  </div>

  <div class="viewer-main" id="viewer-main">
    <canvas id="three-canvas"></canvas>
    <div class="viewer-hint" id="viewer-hint">
      <div class="hint-icon">⚔</div>
      <div>Select an item to view it in 3D</div>
    </div>
    <div class="loading-overlay" id="loading-overlay">Loading model...</div>
    <div class="viewer-info" id="viewer-info">
      <div class="viewer-item-name" id="vi-name"></div>
      <div class="viewer-item-meta" id="vi-meta"></div>
    </div>
    <div class="drag-hint" id="drag-hint">Drag: rotate &nbsp;·&nbsp; Scroll: zoom &nbsp;·&nbsp; Right drag: zoom</div>
    <div class="viewer-controls" id="viewer-controls">
      <button class="ctrl-btn" id="btn-reset">Reset view</button>
      <button class="ctrl-btn" id="btn-wire">Wireframe</button>
    </div>
  </div>
</div>

<script>
// ── Constants ───────────────────────────────────────────────
const API         = 'https://ror-api-production-acc5.up.railway.app';
const MODELS_URL  = 'https://rmihmhpoistwtnbcecli.supabase.co/storage/v1/object/public/models';
const ICONS_URL   = 'https://rmihmhpoistwtnbcecli.supabase.co/storage/v1/object/public/icons';

const RARITY_COLOR = ['var(--common)','var(--uncommon)','var(--rare)','var(--veryrare)','var(--artifact)','var(--sovereign)'];
const RARITY_NAME  = ['Common','Uncommon','Rare','Very Rare','Artifact','Sovereign'];

const CAREER_RACE = {
  1:'emm', 2:'emm', 4:'hem', 8:'hem', 16:'hem',
  32:'dwm', 64:'dwm', 128:'orm', 256:'orm', 512:'orm',
  1024:'dwm', 2048:'dwm', 4096:'cwm', 8192:'cwm', 16384:'cwm',
  32768:'bem', 65536:'bem', 131072:'dem', 262144:'emm',
};

// ── DOM refs ─────────────────────────────────────────────────
const selCareer = document.getElementById('sel-career');
const selSlot   = document.getElementById('sel-slot');
const selRarity = document.getElementById('sel-rarity');
const itemList  = document.getElementById('item-count');
const itemCount = document.getElementById('item-count');
const listEl    = document.getElementById('item-list');

// ── Three.js ─────────────────────────────────────────────────
const THREE = window.THREE || {};

(function loadThree() {
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  script.onload = initThree;
  document.head.appendChild(script);
})();

let renderer, scene, camera;
let spherical = { theta: 0.4, phi: 1.1, radius: 8 };
let target    = { x: 0, y: 1, z: 0 };
let isDragging = false, mouseBtn = -1, prevMouse = { x: 0, y: 0 };
let bodyMeshes = [], itemMeshGroup = null;
let isWireframe = false;
let currentRace = '';

const bodyMat = () => new THREE.MeshStandardMaterial({ color: 0x888890, roughness: 0.7, metalness: 0.1 });
const itemMat = () => new THREE.MeshStandardMaterial({ color: 0xb8a070, roughness: 0.5, metalness: 0.3 });
const wireMat = () => new THREE.MeshBasicMaterial({ color: 0xbf4a06, wireframe: true });

function initThree() {
  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x080600, 1);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, 1, 0.01, 2000);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const key = new THREE.DirectionalLight(0xfff5e0, 2.0);
  key.position.set(2, 4, 3);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xe0eeff, 0.8);
  fill.position.set(-3, 2, -2);
  scene.add(fill);

  resize();
  new ResizeObserver(resize).observe(document.getElementById('viewer-main'));
  updateCamera();
  animate();
  setupControls();
}

function resize() {
  const main = document.getElementById('viewer-main');
  const w = main.clientWidth, h = main.clientHeight;
  if (renderer) {
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

function updateCamera() {
  if (!camera) return;
  const { theta, phi, radius } = spherical;
  camera.position.x = target.x + radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(target.x, target.y, target.z);
}

function animate() {
  requestAnimationFrame(animate);
  if (renderer) renderer.render(scene, camera);
}

function resetView() {
  spherical = { theta: 0.4, phi: 1.1, radius: 8 };
  target    = { x: 0, y: 1, z: 0 };
  updateCamera();
}

function setupControls() {
  const canvas = document.getElementById('three-canvas');

  canvas.addEventListener('mousedown', e => {
    isDragging = true; mouseBtn = e.button;
    prevMouse = { x: e.clientX, y: e.clientY };
    e.preventDefault();
  });
  window.addEventListener('mouseup', () => { isDragging = false; mouseBtn = -1; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
    prevMouse = { x: e.clientX, y: e.clientY };
    if (mouseBtn === 0) {
      spherical.theta -= dx * 0.008;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.008));
    } else {
      spherical.radius = Math.max(1, Math.min(100, spherical.radius - dy * 0.1));
    }
    updateCamera();
  });
  canvas.addEventListener('wheel', e => {
    spherical.radius = Math.max(1, Math.min(100, spherical.radius + e.deltaY * 0.05));
    updateCamera();
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  document.getElementById('btn-reset').addEventListener('click', resetView);
  document.getElementById('btn-wire').addEventListener('click', () => {
    isWireframe = !isWireframe;
    document.getElementById('btn-wire').textContent = isWireframe ? 'Solid' : 'Wireframe';
    if (itemMeshGroup) {
      itemMeshGroup.traverse(m => {
        if (m.isMesh) m.material = isWireframe ? wireMat() : itemMat();
      });
    }
  });
}

// ── OBJ Loader ───────────────────────────────────────────────
async function loadOBJ(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  const text = await res.text();

  const positions = [], normals = [];
  const posArr = [], normArr = [];

  for (const line of text.split('\n')) {
    const p = line.trim().split(/\s+/);
    if (p[0] === 'v')  positions.push(+p[1], +p[2], +p[3]);
    else if (p[0] === 'vn') normals.push(+p[1], +p[2], +p[3]);
    else if (p[0] === 'f') {
      const verts = p.slice(1).map(s => {
        const [vi,,ni] = s.split('/').map(x => parseInt(x)||0);
        return { vi: vi-1, ni: ni-1 };
      });
      for (let i = 1; i < verts.length - 1; i++) {
        for (const { vi, ni } of [verts[0], verts[i], verts[i+1]]) {
          posArr.push(positions[vi*3], positions[vi*3+1], positions[vi*3+2]);
          if (ni >= 0) normArr.push(normals[ni*3], normals[ni*3+1], normals[ni*3+2]);
          else normArr.push(0, 1, 0);
        }
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normArr, 3));
  return geo;
}

async function loadBody(race) {
  if (race === currentRace) return;
  bodyMeshes.forEach(m => scene.remove(m));
  bodyMeshes = [];
  currentRace = race;

  for (const suffix of [`${race}_base_body_01`, `${race}_base_head_a_01`]) {
    try {
      const geo  = await loadOBJ(`${MODELS_URL}/fg.0.0.${suffix}.obj`);
      const mesh = new THREE.Mesh(geo, bodyMat());
      scene.add(mesh);
      bodyMeshes.push(mesh);
    } catch(e) {}
  }
}

async function loadItem(geomStem) {
  if (itemMeshGroup) { scene.remove(itemMeshGroup); itemMeshGroup = null; }
  try {
    const geo  = await loadOBJ(`${MODELS_URL}/${geomStem}.obj`);
    const mesh = new THREE.Mesh(geo, isWireframe ? wireMat() : itemMat());
    itemMeshGroup = new THREE.Group();
    itemMeshGroup.add(mesh);
    scene.add(itemMeshGroup);
  } catch(e) {
    console.warn('Model not in storage:', geomStem);
  }
}

// ── Item browser ─────────────────────────────────────────────
let allItems     = [];
let currentItems = [];

selCareer.addEventListener('change', async function() {
  const careerId = parseInt(this.value);
  const race     = CAREER_RACE[careerId];

  if (!careerId) {
    listEl.innerHTML = '<div class="msg">Select a career to browse items</div>';
    itemCount.textContent = '';
    return;
  }

  listEl.innerHTML = '<div class="msg">Loading items...</div>';
  itemCount.textContent = '';

  if (race) loadBody(race);

  try {
    const res  = await fetch(`${API}/items?limit=1000`);
    allItems   = await res.json();
    filterAndRender(careerId);
  } catch(e) {
    listEl.innerHTML = '<div class="msg" style="color:#e88">Failed to load items</div>';
  }
});

selSlot.addEventListener('change', function() {
  filterAndRender(parseInt(selCareer.value));
});

selRarity.addEventListener('change', function() {
  filterAndRender(parseInt(selCareer.value));
});

function filterAndRender(careerId) {
  if (!careerId) return;

  const slot   = selSlot.value;
  const rarity = selRarity.value;

  currentItems = allItems.filter(it => {
    if (!it.display_name || !it.display_name.trim()) return false;
    // Career bitmask filter
    const c = it.career || 0;
    if (c !== 0 && !(c & careerId)) return false;
    // Slot filter
    if (slot && (it.slot_name || '').toUpperCase() !== slot) return false;
    // Rarity filter
    if (rarity !== '' && it.rarity != parseInt(rarity)) return false;
    return true;
  });

  currentItems.sort((a, b) =>
    (a.minrank || 0) - (b.minrank || 0) ||
    (a.display_name || '').localeCompare(b.display_name || '')
  );

  itemCount.textContent = `${currentItems.length} item${currentItems.length !== 1 ? 's' : ''}`;

  if (!currentItems.length) {
    listEl.innerHTML = '<div class="msg">No items found</div>';
    return;
  }

  listEl.innerHTML = currentItems.map((it, i) => {
    const icon = it.iconid
      ? `<img class="item-icon-small" src="${ICONS_URL}/icon_${it.iconid}.png" onerror="this.style.display='none'" alt="">`
      : '';
    const col  = RARITY_COLOR[it.rarity] || 'var(--text)';
    const rank = it.minrank ? `R${it.minrank}` : '';
    return `<div class="item-entry" data-i="${i}">
      ${icon}
      <span class="item-entry-name" style="color:${col}">${it.display_name.trim()}</span>
      <span class="item-entry-rank">${rank}</span>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.item-entry').forEach(el => {
    el.addEventListener('click', () => selectItem(parseInt(el.dataset.i)));
  });
}

async function selectItem(i) {
  const item = currentItems[i];
  if (!item) return;

  listEl.querySelectorAll('.item-entry').forEach((el, j) =>
    el.classList.toggle('active', j === i)
  );

  document.getElementById('viewer-hint').style.display    = 'none';
  document.getElementById('loading-overlay').style.display = 'block';
  document.getElementById('viewer-info').style.display     = 'none';

  if (item.model_image) {
    await loadItem(item.model_image.replace(/\.png$/, ''));
  } else if (itemMeshGroup) {
    scene.remove(itemMeshGroup);
    itemMeshGroup = null;
  }

  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('viewer-info').style.display     = 'block';
  document.getElementById('viewer-controls').style.display = 'flex';
  document.getElementById('drag-hint').style.display       = 'block';

  const nameEl = document.getElementById('vi-name');
  nameEl.textContent = item.display_name.trim();
  nameEl.style.color = RARITY_COLOR[item.rarity] || 'var(--yellow)';

  document.getElementById('vi-meta').textContent = [
    RARITY_NAME[item.rarity],
    item.slot_name,
    item.minrank ? `Rank ${item.minrank}` : '',
  ].filter(Boolean).join(' · ');
}
</script>
</body>
